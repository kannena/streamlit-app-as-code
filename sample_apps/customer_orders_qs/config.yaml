# =============================================================================
# Sample App 1: Customer Orders Query Studio (Simple)
# =============================================================================
# Demonstrates a basic App-as-Code configuration with:
#   - Three cascading filters (region → department → account)
#   - Text search filter
#   - Date range filter
#   - Column selection
#   - CSV export with filter bundling

app_info:
  title: "Customer Orders Query Studio"
  page_title: "Customer Orders"
  page_icon: "📦"
  page_layout: "wide"

database:
  warehouse: "{ENVIRON}ANALYTICS_WH"
  fallback_warehouse: "{ENVIRON}DEFAULT_WH"
  show_warehouse_info: false
  filter_warehouse_mode: "inherit"

debug:
  show_generated_sql: false
  show_failed_sql: false

filters:
  region:
    label: "Region"
    order: 1
    mandatory: false
    for_more: false
    sql: >
      SELECT DISTINCT region_name
      FROM {DB}.corp.dim_org_hierarchy
      WHERE is_current = 1
        AND region_code IN ({security_divisions})
      ORDER BY 1
    depends_on: []
    placeholder: "Select Region..."
    input_type: "checkbox"
    sql_condition: "oh.region_name IN ({region})"
    allow_multiple: true
    include_in_where: true
    description: "Select one or more regions"

  department:
    label: "Department"
    order: 2
    mandatory: false
    for_more: false
    sql: >
      SELECT DISTINCT department_name
      FROM {DB}.corp.dim_org_hierarchy
      WHERE is_current = 1
        AND region_name IN ({region})
        AND region_code IN ({security_divisions})
      ORDER BY 1
    depends_on: ["region"]
    placeholder: "Select Department..."
    input_type: "checkbox"
    sql_condition: "oh.department_name IN ({department})"
    allow_multiple: true
    include_in_where: true
    description: "Select departments within chosen regions"

  account_name:
    label: "Account Name"
    order: 3
    mandatory: false
    for_more: false
    placeholder: "Search by name..."
    input_type: "text"
    depends_on: []
    allow_multiple: false
    include_in_where: true
    sql_condition: "c.customer_name ILIKE '%{account_name}%'"
    description: "Free-text search on customer name"

  order_date:
    label: "Order Date"
    order: 4
    mandatory: false
    for_more: false
    input_type: "date"
    date_pattern: "range"
    date_column: "o.order_date"
    depends_on: []
    include_in_where: true
    description: "Filter orders by date range"

  order_status:
    label: "Order Status"
    order: 5
    mandatory: false
    for_more: true
    sql: >
      SELECT DISTINCT order_status
      FROM {DB}.analytics.fact_orders
      ORDER BY 1
    depends_on: []
    placeholder: "Select Status..."
    input_type: "checkbox"
    sql_condition: "o.order_status IN ({order_status})"
    allow_multiple: true
    include_in_where: true
    description: "Filter by order fulfillment status"

  column_selection:
    label: "Columns to Display"
    order: 99
    for_more: true
    input_type: "column_selector"
    default_columns:
      - "REGION_NAME"
      - "DEPARTMENT_NAME"
      - "CUSTOMER_NAME"
      - "ORDER_DATE"
      - "ORDER_STATUS"
      - "ORDER_TOTAL"
    all_columns:
      - "REGION_NAME"
      - "DEPARTMENT_NAME"
      - "CUSTOMER_NAME"
      - "ACCOUNT_NUMBER"
      - "ORDER_ID"
      - "ORDER_DATE"
      - "ORDER_STATUS"
      - "ORDER_TOTAL"
      - "LINE_ITEM_COUNT"
      - "SHIPPING_ADDRESS"
      - "PAYMENT_TERMS"

security_filter:
  enabled: true
  query: >
    SELECT DISTINCT region_code
    FROM {DB}.security.user_access_map
    WHERE LOWER(employee_login) = LOWER('{current_user}')
      AND is_active = TRUE
  filter_column: "region_code"
  table_alias: "oh"
  include_in_where: true

export:
  formats:
    csv:
      enabled: true
      label: "📄 Download CSV"
      bundle_as_zip: true
      include_filter_file: true
