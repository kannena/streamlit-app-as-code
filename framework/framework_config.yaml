# =============================================================================
# FRAMEWORK CONFIGURATION — App-as-Code Query Studio Engine
# =============================================================================
# This file contains all framework-level settings that apply to every app.
# Individual apps override specific sections via their own app_config.yaml.
# =============================================================================

# Pagination Settings
pagination:
  default_page_size: 2500
  page_size_options: [25, 50, 100, 250, 500, 1000, 2500, 5000]
  label: "Records per page"

# UI Customization
branding:
  logo_files:
    left: "logo_left.png"
    right: "logo_right.png"
  colors:
    primary: "#1a73e8"
    secondary: "#0d47a1"
    background: "#ffffff"
    border: "#1a73e8"

# =============================================================================
# SECURITY FILTER CONFIGURATION
# =============================================================================
# Row-level security: restricts data to the logged-in user's allowed regions.
# The engine queries the user_access_map table and injects the result into
# every SQL template's WHERE clause automatically.
# =============================================================================

security_filter:
  enabled: false
  query: >
    SELECT DISTINCT a.region_code
    FROM {DB}.security.user_access_map a
    WHERE a.user_login_id = '{current_user}'
      AND a.is_current = TRUE
  filter_column: "region_code"
  table_alias: "A"
  restrict_filters: ["territory", "department", "region"]
  include_in_where: false

# =============================================================================
# USER-FACING MESSAGES
# =============================================================================

messages:
  config_errors:
    config_not_found: "❌ Configuration file 'config.yaml' not found."
    config_parse_error: "❌ Error parsing configuration file: {error}"
    sql_template_not_found: "❌ SQL template file 'queries.sql' not found."

  data_errors:
    filter_load_error: "Error loading {filter_name} options: {error}"
    column_load_error: "❌ Error loading columns: {error}"
    filter_specific_error: "❌ Error loading {filter_label}: {error}"
    record_count_error: "Error calculating record count: {error}"
    query_execution_error: "❌ Error executing query: {error}"
    download_error: "❌ Error preparing download: {error}"
    record_count_display_error: "❌ Error getting record count: {error}"

  validation:
    date_range_error: "From date must be before or equal to To date"
    missing_required_filters: "👉 Select required filters and click **Run Query** to view results"

  success:
    download_ready: "✅ Download ready!"
    query_executing: "🔄 Executing query..."
    results_display: "✅ Showing page {page} of {total_pages} - {record_count} records ({page_size} per page)"

  info:
    select_filters_instruction: "👉 Select required filters and click **Run Query** to view results"

  progress:
    preparing_download: "Preparing download..."
    loading_data: "Loading data..."

# =============================================================================
# BUTTON LABELS & ACTIONS
# =============================================================================

buttons:
  actions:
    run_query:
      label: "▶️ Run Query"
      tooltip: "Execute the query with selected filters"
      icon: "▶️"
      type: "primary"

    download_all:
      label: "📥 Download All"
      tooltip: "Download all records as CSV file"
      icon: "📥"
      type: "secondary"

    clear_filters:
      label: "🔄 Clear All"
      tooltip: "Reset all filters to default values"
      icon: "🔄"
      type: "secondary"

  download:
    csv_download:
      label: "💾 Download CSV"
      tooltip: "Click to download the prepared CSV file"
      filename: "query_results.csv"
      mime_type: "text/csv"

  ui_controls:
    pagination:
      previous: "⬅️ Previous"
      next: "➡️ Next"
      page_info: "Page {current} of {total}"

# =============================================================================
# DATA DISPLAY CONFIGURATION
# =============================================================================

data_display:
  table:
    use_container_width: true
    show_index: false
    column_config_enabled: true
    height: 400
    selection_mode: "multi-row"
    use_column_order: true
    sortable: true

  empty_data:
    show_message: true
    message: "📊 No data found with current filters. Try adjusting your filter selections."
    show_filter_summary: true
    alternative_action: "Clear some filters or expand date ranges to see more results."

  large_data:
    threshold: 50000
    show_warning: true
    warning_message: "⚠️ Large dataset detected ({record_count} records). Consider using filters to reduce data size."
    show_performance_tip: true
    performance_tip: "💡 Tip: Use pagination controls or download options for large datasets."

# =============================================================================
# EXPORT CONFIGURATION
# =============================================================================

export:
  formats:
    csv:
      enabled: true
      label: "📄 Download CSV with Filter Info"
      mime_type: "application/zip"
      file_extension: ".zip"
      include_filter_file: true
      include_readme_file: false
      filter_file_format: "txt"
      bundle_as_zip: true
      preserve_source_format: true
    xlsx:
      enabled: false
      label: "📊 Download ALL in Excel"
      mime_type: "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
      file_extension: ".xlsx"

  filename:
    template: "{app_name}_{timestamp}"
    timestamp_format: "%Y%m%d_%H%M%S"
    include_filters: true
    filter_max: 3
    replace_spaces: true
    max_length: 100

  filter_file:
    enabled: true
    format: "txt"
    include_user_info: true
    include_export_details: true
    include_security_context: true
    max_filter_values_display: 999
    show_all_filter_values: true
    use_actual_user: true
    include_division_details: true

  csv_formatting:
    convert_all_to_text: true
    preserve_source_format: true
    prevent_excel_formatting: true
    excel_prevention_method: "tab"
    include_bom: false

  options:
    max_records: 100000
    show_record_limit_warning: true
    chunk_large_exports: true
    chunk_size: 50000
    column_selection:
      allow_column_selection: true
      default_all_columns: true
      remember_selection: false
    export_current_view: true
    export_all_data: false

# =============================================================================
# RESULTS DISPLAY
# =============================================================================

results:
  layout:
    table_container_height: 500

  filter_summary:
    show_active_filters: true
    max_filters_displayed: 5
    format_template: "Active filters: {filters}"
    empty_message: "No filters applied"

  status:
    show_record_count: true
    show_page_info: true
    show_filter_summary: true

# =============================================================================
# DATA TRANSFORMATIONS
# =============================================================================

transformations:
  cleaning:
    trim_whitespace: true
    replace_nulls: true
    null_replacement: ""
    standardize_empty_strings: true

  dates:
    auto_detect: true
    default_format: "%Y-%m-%d"
    timestamp_formats:
      generated_time: "%Y-%m-%d %H:%M:%S"
      export_filename: "%Y%m%d_%H%M%S"
      report_date: "%m/%d/%Y"
    input_formats:
      - "%Y-%m-%d"
      - "%m/%d/%Y"
      - "%d/%m/%Y"
      - "%Y-%m-%d %H:%M:%S"

  numbers:
    thousands_separator: ","
    decimal_places: 2
    currency_symbol: "$"
    percentage_format: "{:.1%}"

  text:
    trim_whitespace: true
    standardize_case: false
    default_case: "title"
    max_cell_length: 200
    truncation_indicator: "..."

# =============================================================================
# FAVORITE FILTERS (per-user saved filter presets)
# =============================================================================

favorite_filters:
  enabled: true
  table:
    name: "user_saved_filters"
    schema: "reference"

  ui:
    show_current_filters_preview: true
    max_favorite_name_length: 100
    enable_preview: true
    enable_edit: true
    enable_delete: true

  labels:
    save_section_title: "Save Current Filters"
    load_section_title: "Load Saved Filters"
    manage_section_title: "Manage Saved Favorites"
    save_button: "💾 Save Favorite"
    load_button: "📂 Load Filters"
    preview_button: "👁️"
    edit_button: "✏️"
    delete_button: "🗑️"
    cancel_button: "❌ Cancel"

  messages:
    no_filters_to_save: "🔍 Apply some filters first, then save them as a favorite"
    no_favorites_found: "📁 No saved favorites found. Save some filters first!"
    no_favorites_to_manage: "📁 No saved favorites to manage"
    save_success: "✅ Saved favorite: '{name}'"
    load_success: "✅ Favorite filters applied successfully!"
    delete_success: "✅ Deleted '{name}'"
    rename_success: "✅ Renamed to '{name}'"
    save_error: "❌ Error saving favorite filters: {error}"
    load_error: "❌ Error loading favorite filter '{name}': {error}"
    delete_error: "❌ Error deleting favorite filter '{name}': {error}"
    no_connection: "🔒 Favorite Filters require Snowflake connection"

  validation:
    required_fields: ["favorite_name"]
    max_favorites_per_user: 50

# =============================================================================
# DISCLAIMER
# =============================================================================

disclaimer:
  enabled: true
  version: "2025-01-01"
  title: "Confidentiality & Usage Notice"
  content: |
    This application may contain confidential data and is intended solely
    for authorized users.

    Please observe the following guidelines:

    1. Do not share report data with unauthorized individuals.
    2. Do not download data to personal devices.
    3. If data must be exported, ensure it is handled per your
       organization's data protection policies.
    4. Do not email sensitive data without encryption.
    5. Delete exported files once they have served their purpose.

    By clicking "I Accept," you acknowledge these terms.

  body_max_height_px: 500

  persistence:
    enabled: true
    validity_days: 90
    table_name: "{DB}.utility.disclaimer_acceptances"
    auto_create_table: true
    fallback_to_session: true
    audit_enabled: true

# =============================================================================
# UI CONFIGURATION
# =============================================================================

ui:
  session_state_keys:
    snowflake_connected: 'snowflake_connected'
    has_run: 'has_run'
    page: 'page'
    total_records: 'total_records'
    query_executed: 'query_executed'
    auto_collapse_sections: 'auto_collapse_sections'
    run_query_clicked: 'run_query_clicked'
    date_dimension: 'date_dimension'

  labels:
    report_header: "Report Information"
    generated_text: "Generated"
    app_display: "App"

  filter_summary:
    exclude_filters:
      - "column_selection"
    max_single_item_display: 1

  accept_button: "I Accept"
  reject_button: "Exit"
  show_every_session: false
  width_px: 1900
  body_max_height_px: 500

  sections:
    filters:
      main:
        title: "🔍 Filters"
        expanded_default: true
      advanced:
        title: "🧩 Optional Filters"
        expanded_default: false

# =============================================================================
# AUDIT LOGGING
# =============================================================================

audit_logging:
  enabled: true
  table:
    schema: "{DB}.audit"
    name: "app_user_activity"

  activities:
    session_start: true
    disclaimer_accepted: true
    query_executed: true
    data_export: true
    favorite_operations: true
    global_operations: true
    errors: true

  async_logging: true
  batch_size: 1
  batch_timeout_seconds: 5

  retention_days: 365
  cleanup_enabled: true

# =============================================================================
# SUBSCRIPTION MANAGEMENT
# =============================================================================

subscriptions:
  enabled: false
  ui:
    expanded_default: false
    section_title: "📧 Report Subscriptions"
    show_email_override: true

  frequency_options:
    - "Daily"
    - "Weekly"
    - "Monthly"

  table:
    schema: "{DB}.audit"
    name: "user_subscriptions"

  framework:
    integration_module: "subscription_manager"

# =============================================================================
# COMPUTE POOL SETTINGS
# =============================================================================

compute_pool:
  service_auto_suspend_secs: 900
